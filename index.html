<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="Chore Wars — a playful warrior-family gamified chore quest game for The M Clan. Slay quests, build clan momentum, raid Pizza Night. A 3Shamrocks Studio game.">
<meta name="theme-color" content="#FF6B35">
<!-- CSP: no eval, no remote script. Inline styles/scripts (single-file app) + Google Fonts + data/blob images (photo proof). -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: blob:; media-src 'self' blob: data:; font-src 'self' https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline'; connect-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'">
<title>Chore Wars™ — Slay the Quest · The M Clan</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --orange:#FF6B35; --orange-deep:#E8551F; --orange-soft:#FFE3D6;
  --teal:#4ECDC4; --teal-deep:#2FB3AA; --teal-soft:#D9F6F3;
  --purple:#7B68EE; --purple-deep:#5F4BD6; --purple-soft:#E7E2FF;
  --jakob:#FF5C8A; --jakob-deep:#E23E70;
  --dean:#FF9A3C; --dean-deep:#E87D1E;
  --daddy:#4CAF6E; --daddy-deep:#379457;
  --cream:#FFF6EC; --cream-deep:#FBEAD7;
  --card:#FFFFFF;
  --ink:#2B2118; --ink-soft:#6B5E50; --ink-faint:#9A8C7C;
  --gold:#FFC53D;
  --line:#F0E4D4;
  --shadow:0 8px 24px rgba(120,80,40,.12);
  --shadow-lg:0 16px 40px rgba(120,80,40,.18);
  --radius:24px; --radius-sm:16px; --radius-pill:999px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  margin:0;
  font-family:'Nunito',system-ui,-apple-system,sans-serif;
  background:
    radial-gradient(1200px 500px at 100% -10%, rgba(123,104,238,.10), transparent 60%),
    radial-gradient(900px 500px at -10% 0%, rgba(78,205,196,.12), transparent 55%),
    var(--cream);
  color:var(--ink);
  font-size:16px; line-height:1.45;
  overflow-x:hidden;
}
h1,h2,h3,.display{font-family:'Baloo 2',system-ui,sans-serif;font-weight:800;letter-spacing:-.01em;margin:0}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
:focus-visible{outline:3px solid var(--purple);outline-offset:2px;border-radius:8px}
img{max-width:100%}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

/* ===== App shell ===== */
#app{max-width:560px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;position:relative}
.screen{flex:1;padding:14px 16px 120px;animation:fadeUp .35s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){*{animation-duration:.001ms!important}}

/* ===== Top bar ===== */
.topbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:10px;
  padding:12px 16px calc(12px) ;background:linear-gradient(180deg,var(--cream) 70%,rgba(255,246,236,.4));backdrop-filter:blur(6px)}
.brandmark{display:flex;align-items:center;gap:9px;flex:1;min-width:0}
.brandmark .crest{width:38px;height:38px;flex:none}
.brandmark .tt{min-width:0}
.brandmark .tt b{font-family:'Baloo 2';font-size:1.18rem;line-height:1;display:block;color:var(--ink)}
.brandmark .tt span{font-size:.7rem;color:var(--ink-soft);font-weight:700;letter-spacing:.02em}
.profile-chip{display:flex;align-items:center;gap:8px;background:var(--card);border:2px solid var(--line);
  border-radius:var(--radius-pill);padding:5px 10px 5px 5px;box-shadow:var(--shadow);font-weight:800;font-size:.9rem}
.profile-chip .av{width:34px;height:34px;border-radius:50%;flex:none;display:grid;place-items:center;overflow:hidden}
.profile-chip svg{width:34px;height:34px}
.profile-chip .nm{max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.profile-chip .cd{font-size:.85rem;color:var(--ink-faint)}

/* ===== Cards ===== */
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:14px;border:1px solid rgba(255,255,255,.6)}
.card.flat{box-shadow:none;border:2px solid var(--line)}
.section-title{display:flex;align-items:center;gap:9px;margin:18px 4px 10px}
.section-title h2{font-size:1.22rem}
.section-title .em{font-size:1.3rem}
.section-title .count{margin-left:auto;font-size:.8rem;font-weight:800;color:var(--ink-soft);background:var(--cream-deep);padding:3px 11px;border-radius:var(--radius-pill)}

/* ===== Hero / momentum ===== */
.hero{background:linear-gradient(135deg,var(--orange),var(--orange-deep));color:#fff;border-radius:var(--radius);
  padding:18px;box-shadow:var(--shadow-lg);position:relative;overflow:hidden;margin-bottom:14px}
.hero::after{content:"";position:absolute;right:-30px;top:-30px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.10)}
.hero .htop{display:flex;align-items:center;gap:10px;position:relative;z-index:1}
.hero h2{font-size:1.35rem}
.hero .sub{opacity:.92;font-weight:700;font-size:.9rem}
.hero .greet-av{width:54px;height:54px;background:rgba(255,255,255,.18);border-radius:16px;display:grid;place-items:center}
.hero .greet-av svg{width:46px;height:46px}

.statrow{display:flex;gap:9px;margin-top:14px;position:relative;z-index:1}
.stat{flex:1;background:rgba(255,255,255,.16);border-radius:14px;padding:9px 8px;text-align:center}
.stat b{display:block;font-family:'Baloo 2';font-size:1.25rem;line-height:1.1}
.stat span{font-size:.66rem;opacity:.9;font-weight:800;letter-spacing:.03em;text-transform:uppercase}

/* level bar */
.levelbar{margin-top:14px;position:relative;z-index:1}
.levelbar .lb-top{display:flex;justify-content:space-between;font-size:.78rem;font-weight:800;margin-bottom:5px}
.track{height:14px;background:rgba(0,0,0,.18);border-radius:99px;overflow:hidden;position:relative}
.track .fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#FFE7A8,var(--gold));transition:width .9s cubic-bezier(.2,.9,.3,1);position:relative}
.track .fill::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.5),transparent);transform:translateX(-100%);animation:shine 2.4s ease-in-out infinite}
@keyframes shine{to{transform:translateX(100%)}}

/* ===== Momentum meter ===== */
.momentum{background:linear-gradient(135deg,var(--purple),var(--purple-deep));color:#fff;border-radius:var(--radius);padding:18px;box-shadow:var(--shadow-lg);position:relative;overflow:hidden}
.momentum .flame{font-size:2.4rem;filter:drop-shadow(0 4px 8px rgba(0,0,0,.25))}
.momentum h2{font-size:1.3rem}
.mtiers{display:flex;gap:5px;margin:14px 0 10px}
.mtier{flex:1;text-align:center;font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.02em;opacity:.5}
.mtier .dot{height:10px;border-radius:99px;background:rgba(255,255,255,.25);margin-bottom:6px;transition:.5s}
.mtier.on{opacity:1}
.mtier.on .dot{background:#fff;box-shadow:0 0 12px rgba(255,255,255,.6)}
.mtier.cur{transform:translateY(-3px) scale(1.04)}
.mnext{font-weight:800;font-size:.92rem;background:rgba(255,255,255,.16);border-radius:12px;padding:9px 12px;text-align:center}

/* ===== Quest cards ===== */
.quest{display:flex;align-items:center;gap:13px;background:var(--card);border-radius:var(--radius-sm);
  box-shadow:var(--shadow);padding:13px;margin-bottom:11px;border:2px solid transparent;transition:.25s}
.quest.done{opacity:.62;border-color:var(--teal);background:var(--teal-soft)}
.quest .qicon{width:50px;height:50px;border-radius:14px;display:grid;place-items:center;font-size:1.6rem;flex:none}
.quest .qbody{flex:1;min-width:0}
.quest .qbody h3{font-size:1.04rem;line-height:1.15}
.quest .qmeta{display:flex;flex-wrap:wrap;gap:6px;margin-top:5px}
.tag{font-size:.7rem;font-weight:800;padding:2px 9px;border-radius:99px;display:inline-flex;align-items:center;gap:3px}
.tag.xp{background:var(--purple-soft);color:var(--purple-deep)}
.tag.coin{background:#FFF1C9;color:#B9850C}
.tag.who{background:var(--cream-deep);color:var(--ink-soft)}
.tag.pend{background:#FFE3D6;color:var(--orange-deep)}
.tag.verified{background:var(--teal-soft);color:var(--teal-deep)}
.qcheck{width:46px;height:46px;border-radius:14px;background:var(--cream-deep);display:grid;place-items:center;flex:none;transition:.2s;border:2px solid var(--line)}
.qcheck:hover{transform:scale(1.06)}
.qcheck:active{transform:scale(.92)}
.qcheck.done{background:var(--teal);border-color:var(--teal-deep)}
.qcheck svg{width:24px;height:24px}
.qphoto{width:46px;height:46px;border-radius:14px;background:var(--orange-soft);display:grid;place-items:center;flex:none;font-size:1.2rem;border:2px dashed var(--orange);transition:.2s}
.qphoto.has{border-style:solid;background:var(--teal-soft);border-color:var(--teal)}
.qphoto:active{transform:scale(.92)}
.qthumb{width:46px;height:46px;border-radius:12px;object-fit:cover;flex:none;border:2px solid var(--teal)}

/* ===== Raid / boss ===== */
.raid{background:linear-gradient(135deg,#3A2A6B,#241a47);color:#fff;border-radius:var(--radius);padding:18px;box-shadow:var(--shadow-lg);position:relative;overflow:hidden}
.raid::before{content:"";position:absolute;inset:0;background:radial-gradient(300px 120px at 80% 0,rgba(123,104,238,.4),transparent)}
.raid>*{position:relative;z-index:1}
.raid .rtop{display:flex;align-items:center;gap:12px}
.raid .boss{font-size:2.6rem;filter:drop-shadow(0 4px 10px rgba(0,0,0,.4))}
.raid h2{font-size:1.3rem}
.raid .rsub{opacity:.85;font-weight:700;font-size:.85rem}
.hp{margin-top:14px}
.hp .hptop{display:flex;justify-content:space-between;font-weight:800;font-size:.82rem;margin-bottom:6px}
.hp .track{height:20px;background:rgba(0,0,0,.35)}
.hp .track .fill{background:linear-gradient(90deg,#FF8A5B,#FF4D4D)}
.contribs{display:flex;gap:7px;margin-top:13px;flex-wrap:wrap}
.contrib{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.14);border-radius:99px;padding:4px 11px 4px 4px;font-weight:800;font-size:.8rem}
.contrib .av{width:26px;height:26px;border-radius:50%;overflow:hidden;display:grid;place-items:center}
.contrib .av svg{width:26px;height:26px}

/* ===== Battle log ===== */
.logitem{display:flex;gap:11px;padding:11px 4px;border-bottom:1px solid var(--line)}
.logitem:last-child{border-bottom:none}
.logitem .lav{width:38px;height:38px;border-radius:50%;flex:none;overflow:hidden;display:grid;place-items:center;background:var(--cream-deep)}
.logitem .lav svg{width:38px;height:38px}
.logitem .lbody{flex:1;min-width:0}
.logitem .lbody p{margin:0;font-weight:700;font-size:.92rem}
.logitem .lbody .lt{font-size:.72rem;color:var(--ink-faint);font-weight:700}
.logitem .lbadge{font-size:1.1rem;flex:none}

/* ===== Leaderboard ===== */
.leader{display:flex;align-items:center;gap:12px;padding:11px;border-radius:var(--radius-sm);margin-bottom:9px;background:var(--cream);border:2px solid var(--line)}
.leader.me{border-color:var(--orange);background:var(--orange-soft)}
.leader .rank{font-family:'Baloo 2';font-size:1.2rem;width:26px;text-align:center;color:var(--ink-soft)}
.leader .lav{width:46px;height:46px;border-radius:50%;overflow:hidden;display:grid;place-items:center;flex:none}
.leader .lav svg{width:46px;height:46px}
.leader .linfo{flex:1;min-width:0}
.leader .linfo b{font-size:1rem;display:block}
.leader .linfo span{font-size:.78rem;color:var(--ink-soft);font-weight:700}
.leader .lxp{text-align:right;font-weight:800}
.leader .lxp b{font-family:'Baloo 2';font-size:1.1rem;color:var(--purple-deep)}
.leader .lxp span{display:block;font-size:.68rem;color:var(--ink-faint)}

/* ===== Goals / treasury ===== */
.treasury{background:linear-gradient(135deg,var(--teal),var(--teal-deep));color:#fff;border-radius:var(--radius);padding:18px;box-shadow:var(--shadow-lg)}
.treasury .bal{display:flex;align-items:baseline;gap:8px}
.treasury .bal b{font-family:'Baloo 2';font-size:2.4rem;line-height:1}
.treasury .bal .c{font-size:1rem;font-weight:800;opacity:.9}
.goalcard{background:var(--card);border-radius:var(--radius-sm);box-shadow:var(--shadow);padding:15px;margin-bottom:12px}
.goalcard .gtop{display:flex;align-items:center;gap:11px;margin-bottom:10px}
.goalcard .gem{font-size:1.7rem}
.goalcard h3{font-size:1.05rem;flex:1}
.goalcard .gpct{font-weight:800;color:var(--teal-deep)}
.sword-track{height:16px;background:var(--cream-deep);border-radius:99px;overflow:hidden}
.sword-track .fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--purple));border-radius:99px;transition:width .9s cubic-bezier(.2,.9,.3,1)}
.goalcard .gfoot{display:flex;justify-content:space-between;margin-top:8px;font-weight:800;font-size:.82rem;color:var(--ink-soft)}

/* ===== Armory ===== */
.armory-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.armo{background:var(--card);border-radius:var(--radius-sm);box-shadow:var(--shadow);padding:14px;text-align:center;border:2px solid transparent;position:relative}
.armo.owned{border-color:var(--teal)}
.armo.equipped{border-color:var(--purple);background:var(--purple-soft)}
.armo.locked{opacity:.92}
.armo .preview{height:84px;display:grid;place-items:center;margin-bottom:6px}
.armo .preview svg{width:74px;height:74px}
.armo .preview .big-em{font-size:3rem}
.armo h4{font-family:'Baloo 2';font-size:.98rem;margin-bottom:2px}
.armo .price{font-weight:800;font-size:.8rem;color:var(--ink-soft);margin-bottom:8px}
.armo .ribbon{position:absolute;top:8px;right:8px;font-size:.62rem;font-weight:900;padding:2px 8px;border-radius:99px;text-transform:uppercase}
.armo .ribbon.eq{background:var(--purple);color:#fff}
.armo .ribbon.ow{background:var(--teal);color:#fff}

/* ===== Buttons ===== */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:'Baloo 2';font-weight:800;
  border-radius:var(--radius-pill);padding:13px 20px;font-size:1rem;transition:.18s;box-shadow:0 5px 0 rgba(0,0,0,.12);user-select:none}
.btn:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(0,0,0,.12)}
.btn.block{width:100%}
.btn.orange{background:var(--orange);color:#fff;box-shadow:0 5px 0 var(--orange-deep)}
.btn.orange:active{box-shadow:0 2px 0 var(--orange-deep)}
.btn.teal{background:var(--teal);color:#fff;box-shadow:0 5px 0 var(--teal-deep)}
.btn.teal:active{box-shadow:0 2px 0 var(--teal-deep)}
.btn.purple{background:var(--purple);color:#fff;box-shadow:0 5px 0 var(--purple-deep)}
.btn.purple:active{box-shadow:0 2px 0 var(--purple-deep)}
.btn.gold{background:var(--gold);color:#5a3d00;box-shadow:0 5px 0 #D89B00}
.btn.gold:active{box-shadow:0 2px 0 #D89B00}
.btn.ghost{background:var(--card);color:var(--ink);box-shadow:0 0 0 2px var(--line) inset;border:none}
.btn.ghost:active{transform:translateY(1px);box-shadow:0 0 0 2px var(--line) inset}
.btn.sm{padding:9px 15px;font-size:.85rem;box-shadow:0 4px 0 rgba(0,0,0,.12)}
.btn[disabled]{opacity:.5;pointer-events:none;filter:grayscale(.3)}

/* ===== Empty states ===== */
.empty{text-align:center;padding:30px 18px;color:var(--ink-soft)}
.empty .em{font-size:3.2rem;display:block;margin-bottom:8px;animation:bob 2.6s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.empty h3{font-size:1.2rem;color:var(--ink);margin-bottom:5px}
.empty p{font-weight:700;font-size:.92rem}

/* ===== Oversight (Daddy) ===== */
.oversight{background:linear-gradient(135deg,var(--daddy),var(--daddy-deep));color:#fff;border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow-lg)}
.appr{display:flex;align-items:center;gap:11px;background:var(--card);color:var(--ink);border-radius:var(--radius-sm);padding:12px;margin-bottom:10px;box-shadow:var(--shadow)}
.appr .ainfo{flex:1;min-width:0}
.appr .ainfo b{display:block;font-size:.96rem}
.appr .ainfo span{font-size:.78rem;color:var(--ink-soft);font-weight:700}
.appr .athumb{width:48px;height:48px;border-radius:12px;object-fit:cover;border:2px solid var(--teal);flex:none}
.appr .actions{display:flex;gap:7px;flex:none}
.iconbtn{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-size:1.2rem;box-shadow:0 4px 0 rgba(0,0,0,.12)}
.iconbtn:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(0,0,0,.12)}
.iconbtn.ok{background:var(--teal);color:#fff}
.iconbtn.no{background:#FFD9D2;color:var(--orange-deep)}

/* ===== Me / profile ===== */
.profhead{display:flex;flex-direction:column;align-items:center;text-align:center;padding:8px 0 4px}
.profhead .bigav{width:110px;height:110px;border-radius:50%;display:grid;place-items:center;box-shadow:var(--shadow-lg);margin-bottom:10px;position:relative}
.profhead .bigav svg{width:96px;height:96px}
.profhead h2{font-size:1.5rem}
.profhead .role{font-weight:800;color:var(--ink-soft);font-size:.9rem}
.switchrow{display:flex;gap:9px;margin:8px 0 4px}
.switch-card{flex:1;background:var(--card);border:2px solid var(--line);border-radius:var(--radius-sm);padding:11px 6px;text-align:center;transition:.2s;box-shadow:var(--shadow)}
.switch-card.active{border-color:var(--orange);background:var(--orange-soft)}
.switch-card .av{width:50px;height:50px;border-radius:50%;margin:0 auto 5px;display:grid;place-items:center;overflow:hidden}
.switch-card .av svg{width:50px;height:50px}
.switch-card b{font-size:.86rem;display:block}
.switch-card span{font-size:.66rem;color:var(--ink-soft);font-weight:800}

.aboutbrand{text-align:center;padding:10px}
.aboutbrand img{width:160px;margin:6px auto 10px;display:block}
.aboutbrand .tm{font-weight:800;font-size:.9rem;color:var(--ink-soft)}
.aboutbrand .cp{font-size:.74rem;color:var(--ink-faint);margin-top:6px;font-weight:700}

/* ===== Bottom nav ===== */
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:50;max-width:560px;margin:0 auto;
  background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-top:1px solid var(--line);
  display:flex;padding:7px 6px calc(7px + var(--safe-bottom));box-shadow:0 -6px 22px rgba(120,80,40,.10)}
.tabbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 2px;border-radius:14px;color:var(--ink-faint);transition:.2s}
.tabbtn .ti{width:26px;height:26px}
.tabbtn span{font-size:.64rem;font-weight:800;letter-spacing:.01em}
.tabbtn.active{color:var(--orange)}
.tabbtn.active .ti{transform:translateY(-1px)}
.tabbtn .ti svg{width:26px;height:26px;display:block}

/* ===== Toast ===== */
#toastwrap{position:fixed;left:0;right:0;bottom:96px;z-index:80;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none;padding:0 16px}
.toast{background:var(--ink);color:#fff;font-weight:800;padding:13px 18px;border-radius:var(--radius-pill);box-shadow:var(--shadow-lg);
  display:flex;align-items:center;gap:9px;max-width:520px;animation:toastIn .4s cubic-bezier(.2,1.4,.4,1) both;font-size:.95rem}
.toast .em{font-size:1.3rem}
.toast.victory{background:linear-gradient(135deg,var(--teal),var(--teal-deep))}
.toast.xp{background:linear-gradient(135deg,var(--purple),var(--purple-deep))}
.toast.coin{background:linear-gradient(135deg,var(--gold),#E0A800);color:#5a3d00}
@keyframes toastIn{from{opacity:0;transform:translateY(20px) scale(.9)}to{opacity:1;transform:none}}
.toast.out{animation:toastOut .35s ease forwards}
@keyframes toastOut{to{opacity:0;transform:translateY(12px) scale(.95)}}

/* ===== XP burst ===== */
#burstwrap{position:fixed;inset:0;z-index:90;pointer-events:none;overflow:hidden}
.spark{position:absolute;font-size:1.4rem;animation:spark .9s ease-out forwards}
@keyframes spark{0%{opacity:1;transform:translate(0,0) scale(.6) rotate(0)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(1.3) rotate(var(--rot))}}

/* ---------- time helpers ---------- */
function isoDay(off){var d=new Date();d.setDate(d.getDate()+(off||0));return d.toISOString().slice(0,10);}
function tsAgo(min){return Date.now()-min*60000;}
function relTime(ts){
  var s=(Date.now()-ts)/1000;
  if(s<60)return'just now';
  if(s<3600)return Math.floor(s/60)+'m ago';
  if(s<86400)return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}

/* ---------- persistence ---------- */
function load(){
  try{var raw=localStorage.getItem(STORE_KEY);if(raw){state=JSON.parse(raw);
    // light migration / refresh of "today" daily quests so app opens alive
    return;}}catch(e){}
  state=defaultState();save();
}
function save(){try{localStorage.setItem(STORE_KEY,JSON.stringify(state));}catch(e){}}
function resetDemo(){state=defaultState();currentTab='missions';save();render();toast('🔄','Demo data reset — fresh battlefield!','victory');}

function xpInLevel(xp){return xp%XP_PER_LEVEL;}
function momentumTier(streak){var t=MOMENTUM_TIERS[0];for(var i=0;i<MOMENTUM_TIERS.length;i++){if(streak>=MOMENTUM_TIERS[i].min)t=MOMENTUM_TIERS[i];}return t;}
function nextTier(streak){for(var i=0;i<MOMENTUM_TIERS.length;i++){if(streak<MOMENTUM_TIERS[i].min)return MOMENTUM_TIERS[i];}return null;}

function toast(em,msg,kind){
  var wrap=$('#toastwrap');
  var t=E('div',{class:'toast'+(kind?(' '+kind):'')},[E('span',{class:'em',text:em}),E('span',{text:msg})]);
  wrap.appendChild(t);
  setTimeout(function(){t.classList.add('out');setTimeout(function(){if(t.parentNode)t.parentNode.removeChild(t);},400);},2400);
}
function burst(x,y){
  var emojis=['⚔️','✨','🔥','⭐','💥','🛡️'];
  for(var i=0;i<12;i++){
    var s=E('span',{class:'spark',text:emojis[i%emojis.length]});
    var ang=(Math.PI*2)*(i/12)+ (Math.random()*0.5);
    var dist=60+Math.random()*70;
    s.style.left=x+'px';s.style.top=y+'px';
    s.style.setProperty('--dx',(Math.cos(ang)*dist)+'px');
    s.style.setProperty('--dy',(Math.sin(ang)*dist)+'px');
    s.style.setProperty('--rot',(Math.random()*360-180)+'deg');
    $('#burstwrap').appendChild(s);
    (function(el){setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el);},950);})(s);
  }
}
function xpFloat(x,y,txt){
  var f=E('div',{class:'xpfloat',text:txt});
  f.style.left=(x-20)+'px';f.style.top=(y-20)+'px';
  document.body.appendChild(f);
  setTimeout(function(){if(f.parentNode)f.parentNode.removeChild(f);},1150);
}

function questCard(q){
  var c=E('div',{class:'quest'+(q.done?' done':'')});
  c.appendChild(E('div',{class:'qicon',style:'background:'+(q.done?'var(--teal-soft)':'var(--orange-soft)'),text:q.em}));

  ]);
  if(q.photo==='pending'||(q.photo&&!q.verified&&q.done)) meta.appendChild(E('span',{class:'tag pend',text:'📷 awaiting Daddy'}));
  if(q.verified&&q.done) meta.appendChild(E('span',{class:'tag verified',text:'✅ verified'}));
  c.appendChild(E('div',{class:'qbody'},[E('h3',{text:q.title}),meta]));

  // photo proof button / thumb
  if(q.photo && q.photo!=='pending'){
    c.appendChild(E('img',{class:'qthumb',src:q.photo,alt:'proof'}));
  } else if(!q.done){
    c.appendChild(E('button',{class:'qphoto'+(q.photo?' has':''),'aria-label':'Add photo proof (+15 XP)',title:'Photo proof = +15 XP',
      on:{click:function(){addPhotoProof(q);}}},'📷'));
  }

  var chk=E('button',{class:'qcheck'+(q.done?' done':''),'aria-label':q.done?'Completed':'Complete quest',
    on:{click:function(ev){toggleQuest(q,ev);}}});
  chk.innerHTML=q.done?ICONS.check.replace('currentColor','#fff'):ICONS.check;
  if(q.done) chk.style.color='#fff';
  c.appendChild(chk);
  return c;

function toggleQuest(q,ev){
  if(q.done){ // undo
    q.done=false;q.verified=false;
    var p=P(q.who);p.xp=Math.max(0,p.xp-q.xp);p.coins=Math.max(0,p.coins-q.coins);
    dealDamage(q.who,-1);
    save();render();return;
  }
  q.done=true;
  var p=P(q.who);p.xp+=q.xp;p.coins+=q.coins;
  // momentum: completing keeps streak warm (demo)
  addLog(q.who,'⚔️',P(q.who).name+' slayed “'+q.title+'” — Victory Logged! +'+q.xp+' XP');
  dealDamage(q.who,1);
  // feedback
  var r=ev&&ev.currentTarget?ev.currentTarget.getBoundingClientRect():{left:innerWidth/2,top:innerHeight/2,width:0,height:0};
  burst(r.left+r.width/2,r.top+r.height/2);
  xpFloat(r.left+r.width/2,r.top, '+'+q.xp+' XP');
  toast('⚔️','Victory! +'+q.xp+' XP, +'+q.coins+' 🪙','victory');
  checkRaidDefeat();
  save();render();
}

function addPhotoProof(q){
  pickPhoto(function(dataUrl){
    q.photo=dataUrl; q.done=true; q.verified=false;
    var p=P(q.who);p.xp+=q.xp+15;p.coins+=q.coins; // +15 XP bonus for proof
    addLog(q.who,'📷',P(q.who).name+' submitted photo proof for “'+q.title+'” (+15 XP) — awaiting Daddy ✅');
    dealDamage(q.who,1);
    toast('📷','Proof submitted! +'+(q.xp+15)+' XP — Daddy will verify','xp');
    burst(innerWidth/2,innerHeight/2);
    checkRaidDefeat();
    save();render();
  });
}

/* photo picker — camera/file; falls back to a generated placeholder if no file chosen */
function pickPhoto(cb){
  var inp=$('#photoInput');
  var handler=function(){
    var f=inp.files&&inp.files[0];
    inp.removeEventListener('change',handler); inp.value='';
    if(!f){ cb(placeholderPhoto()); return; }
    var fr=new FileReader();
    fr.onload=function(){ cb(fr.result); };
    fr.onerror=function(){ cb(placeholderPhoto()); };
    fr.readAsDataURL(f);
  };
  inp.addEventListener('change',handler);
  // On devices w/o camera the dialog may cancel → still allow a demo proof via fallback timer
  inp.click();
}
function placeholderPhoto(){
  // tiny inline SVG "proof" image as data URL (demo / no-camera fallback)
  var svg='<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120"><rect width="120" height="120" fill="#4ECDC4"/><text x="60" y="58" font-size="40" text-anchor="middle">📷</text><text x="60" y="92" font-size="13" text-anchor="middle" fill="#fff" font-family="sans-serif">Proof!</text></svg>';
  return 'data:image/svg+xml;utf8,'+encodeURIComponent(svg);
}

  }

  if(pendPhotos.length){
    wrap.appendChild(E('div',{class:'section-title'},[E('span',{class:'em',text:'📷'}),E('h2',{text:'Verify Photo Proof'})]));
    pendPhotos.forEach(function(q){
      var row=E('div',{class:'appr'});
      if(q.photo&&q.photo!=='pending') row.appendChild(E('img',{class:'athumb',src:q.photo,alt:'proof'}));
      else row.appendChild(E('span',{style:'font-size:1.8rem',text:'📷'}));
      row.appendChild(E('div',{class:'ainfo'},[E('b',{text:q.title}),E('span',{text:P(q.who).name+' · +15 XP proof bonus'})]));
      row.appendChild(E('div',{class:'actions'},[
        E('button',{class:'iconbtn ok','aria-label':'Approve',on:{click:function(){verifyQuest(q,true);}}},'✓'),
        E('button',{class:'iconbtn no','aria-label':'Reject',on:{click:function(){verifyQuest(q,false);}}},'✕')
      ]));
      wrap.appendChild(row);
    });
  }
  if(pendExtra.length){
    wrap.appendChild(E('div',{class:'section-title'},[E('span',{class:'em',text:'🌟'}),E('h2',{text:'Approve Bonus Quests'})]));
    pendExtra.forEach(function(x){
      wrap.appendChild(E('div',{class:'appr'},[
        E('span',{style:'font-size:1.8rem',text:x.em}),
        E('div',{class:'ainfo'},[E('b',{text:x.title}),E('span',{text:P(x.claimedBy).name+' · +'+x.xp+' XP'})]),
        E('div',{class:'actions'},[
          E('button',{class:'iconbtn ok','aria-label':'Approve',on:{click:function(){x.verified=true;addLog('daddy','🛡️','Daddy verified “'+x.title+'” for '+P(x.claimedBy).name+' ✅');save();render();toast('✅','Approved!','victory');}}},'✓'),
          E('button',{class:'iconbtn no','aria-label':'Reject',on:{click:function(){x.done=false;x.verified=false;save();render();toast('↩️','Sent back to redo','xp');}}},'✕')
        ])
      ]));
    });
  }
  if(pendPay.length){
    wrap.appendChild(E('div',{class:'section-title'},[E('span',{class:'em',text:'💵'}),E('h2',{text:'Approve Allowance'})]));
    pendPay.forEach(function(x){
      wrap.appendChild(E('div',{class:'appr'},[
        E('span',{style:'font-size:1.8rem',text:'💵'}),
        E('div',{class:'ainfo'},[E('b',{text:'$'+x.usd.toFixed(2)+' payout'}),E('span',{text:P(x.who).name+' · '+x.coins+' 🪙 · '+relTime(x.ts)})]),
        E('div',{class:'actions'},[
          E('button',{class:'iconbtn ok','aria-label':'Approve',on:{click:function(){x.status='paid';addLog(x.who,'💵','Daddy paid '+P(x.who).name+' $'+x.usd.toFixed(2)+' allowance 💰');save();render();toast('💰','Allowance paid!','coin');}}},'✓'),
          E('button',{class:'iconbtn no','aria-label':'Decline',on:{click:function(){x.status='declined';P(x.who).coins+=x.coins;save();render();toast('↩️','Coins refunded to '+P(x.who).name,'coin');}}},'✕')
        ])
      ]));
    });
  }
  return wrap;
}
function verifyQuest(q,ok){
  if(ok){q.verified=true;addLog(q.who,'🛡️','Daddy verified “'+q.title+'” for '+P(q.who).name+' — proof accepted! ✅');toast('✅','Proof verified!','victory');}
  else {q.verified=false;q.photo=null;q.done=false;var p=P(q.who);p.xp=Math.max(0,p.xp-15);addLog(q.who,'↩️','Daddy asked '+P(q.who).name+' to redo “'+q.title+'”');toast('↩️','Sent back to redo','xp');}
  save();render();
}

/* ============================================================
   VIEW: ME (profile, switch, armory, about)
   ============================================================ */
function viewMe(main){
  var p=P();
  // profile header
  var head=E('div',{class:'profhead'});
  var av=E('div',{class:'bigav',style:'background:'+lighten(p.color)});av.innerHTML=avatarFor(p.id,p.gear);
  head.appendChild(av);
  head.appendChild(E('h2',{text:p.name+(p.id==='daddy'?' 👑':'')}));
  head.appendChild(E('div',{class:'role',text:p.role+' · Level '+levelOf(p.xp)+' · '+p.xp+' XP · 🪙 '+p.coins}));
  main.appendChild(head);

  // switch warriors
  main.appendChild(E('div',{class:'section-title'},[E('span',{class:'em',text:'🔄'}),E('h2',{text:'Switch Warrior'})]));
  var row=E('div',{class:'switchrow'});
  ['jakob','dean','daddy'].forEach(function(k){
    var pr=P(k);
    var card=E('button',{class:'switch-card'+(k===state.activeProfile?' active':''),on:{click:function(){switchProfile(k);}}});
    var a=E('div',{class:'av'});a.innerHTML=avatarFor(k,pr.gear);card.appendChild(a);
    card.appendChild(E('b',{text:pr.name}));card.appendChild(E('span',{text:k==='daddy'?'Clan Leader':'Lv '+levelOf(pr.xp)}));
    row.appendChild(card);
  });
  main.appendChild(row);

  // armory
  main.appendChild(E('div',{class:'section-title'},[E('span',{class:'em',text:'🛡️'}),E('h2',{text:'Armory'}),
    E('span',{class:'count',text:'🪙 '+p.coins+' · ⭐ '+p.xp})]));
  main.appendChild(E('p',{style:'color:var(--ink-soft);font-weight:700;margin:0 4px 12px',text:'Unlock & equip new armor with coins and XP.'}));
  var grid=E('div',{class:'armory-grid'});
  // default armor option
  grid.appendChild(armoCard({id:'a_default',name:'Clan Armor',gear:null,cost:0,costType:'coins',isDefault:true}));
  state.armory.forEach(function(a){grid.appendChild(armoCard(a));});
  main.appendChild(grid);

  // settings / about
  main.appendChild(E('div',{class:'section-title'},[E('span',{class:'em',text:'⚙️'}),E('h2',{text:'Clan Settings'})]));
  main.appendChild(E('div',{class:'card'},[
    E('button',{class:'btn ghost block',style:'margin-bottom:10px',on:{click:function(){
      if(confirm('Reset all Chore Wars demo data? This restores the original clan, quests and treasury.')) resetDemo();
    }}},'🔄 Reset Demo Data'),
    E('button',{class:'btn ghost block',on:{click:showAbout}},'ℹ️ About Chore Wars')
  ]));

  // branding (full line, unobtrusive)
  main.appendChild(E('div',{class:'aboutbrand'},[
    E('img',{src:'3shamrocks_black.png',alt:'3Shamrocks Studio logo'}),
    E('div',{class:'tm',text:'Chore Wars™ — a 3Shamrocks Studio game'}),
    E('div',{class:'cp',text:'© 2026 3Shamrocks Studio. All rights reserved.'})
  ]));
}
function lighten(hex){
  // produce a soft tinted bg
  return hex+'22';
}
function armoCard(a){
  var p=P();
  var owned = a.isDefault || (state.owned[p.id]||[]).indexOf(a.gear)>=0;
  var equipped = (p.gear||null)===(a.gear||null);
  var cls='armo'+(equipped?' equipped':(owned?' owned':' locked'));
  var card=E('div',{class:cls});
  if(equipped) card.appendChild(E('span',{class:'ribbon eq',text:'Equipped'}));
  else if(owned) card.appendChild(E('span',{class:'ribbon ow',text:'Owned'}));
  var prev=E('div',{class:'preview'});prev.innerHTML=avatarFor(p.id,a.gear);card.appendChild(prev);
  card.appendChild(E('h4',{text:a.name}));
  card.appendChild(E('div',{class:'price',text:a.isDefault?'Default':(a.costType==='coins'?('🪙 '+a.cost):('⭐ '+a.cost+' XP'))}));
  if(equipped){
    card.appendChild(E('button',{class:'btn ghost sm',disabled:'true'},'Wearing'));
  } else if(owned){
    card.appendChild(E('button',{class:'btn purple sm',on:{click:function(){equipGear(a.gear);}}},'Equip'));
  } else {
    var can = a.costType==='coins'? p.coins>=a.cost : p.xp>=a.cost;
    card.appendChild(E('button',{class:'btn gold sm',disabled:can?null:'true',on:{click:function(ev){buyGear(a,ev);}}}, can?'Unlock':'Locked'));
  }
  return card;
}
function buyGear(a,ev){
  var p=P();
  if(a.costType==='coins'){ if(p.coins<a.cost)return; p.coins-=a.cost; }
  else { if(p.xp<a.cost)return; /* XP is "spent" as prestige unlock; keep level but deduct */ p.xp-=a.cost; }
  (state.owned[p.id]=state.owned[p.id]||[]).push(a.gear);
  p.gear=a.gear;
  addLog(p.id,'🛡️',P(p.id).name+' unlocked & equipped '+a.name+'!');
  var r=ev.currentTarget.getBoundingClientRect();burst(r.left+r.width/2,r.top+r.height/2);
  toast('🛡️','Unlocked '+a.name+'! Looking legendary','victory');
  save();render();
}
function equipGear(gear){
  var p=P();p.gear=gear;save();render();toast('✨','Armor equipped!','xp');
}

/* ============================================================
   PROFILE SWITCH (with quick picker from top chip)
   ============================================================ */
function switchProfile(id){
  state.activeProfile=id;currentTab=(id==='daddy'?'squad':'missions');save();render();window.scrollTo(0,0);
  toast(id==='daddy'?'👑':'⚔️','Now playing as '+P(id).name+(id==='daddy'?' (Clan Leader)':'!'), id==='daddy'?'victory':'xp');
}
function openProfilePicker(){
  modal({
    title:'⚔️ Choose Your Warrior',
    lead:'Switch profiles for The M Clan.',
    custom:function(body){
      ['jakob','dean','daddy'].forEach(function(k){
        var pr=P(k);
        var b=E('button',{class:'leader'+(k===state.activeProfile?' me':''),style:'width:100%;text-align:left;cursor:pointer',
          on:{click:function(){closeModal();switchProfile(k);}}},[
          avNode(k,pr.gear,'lav'),
          E('div',{class:'linfo'},[E('b',{text:pr.name+(k==='daddy'?' 👑':'')}),E('span',{text:pr.role+' · Lv '+levelOf(pr.xp)})]),
          E('div',{class:'lxp'},[E('b',{text:'🪙'+pr.coins}),E('span',{text:pr.xp+' XP'})])
        ]);
        body.appendChild(b);
      });
    }
  });
}

function showAbout(){
  modal({
    title:'Chore Wars™',
    lead:'A playful warrior-family quest game for The M Clan.',
    custom:function(body){
      var c=E('div',{class:'crest',style:'width:80px;height:80px;margin:0 auto 10px'});c.innerHTML=crestSVG();
      body.appendChild(c);
      body.appendChild(E('p',{style:'text-align:center;font-weight:700;color:var(--ink-soft)',
        text:'Slay daily quests, raid Pizza Night together, build clan momentum, and earn real allowance — all as warriors Jakob, Dean & Daddy.'}));
      body.appendChild(E('div',{class:'aboutbrand'},[
        E('img',{src:'3shamrocks_black.png',alt:'3Shamrocks Studio logo'}),
        E('div',{class:'tm',text:'Chore Wars™ — a 3Shamrocks Studio game'}),
        E('div',{class:'cp',text:'© 2026 3Shamrocks Studio. All rights reserved.'})
      ]));
    },
    okLabel:'Onward! ⚔️',okClass:'orange',onOk:function(){}
  });
}

/* ============================================================
   SHARED MECHANICS
   ============================================================ */
function addLog(who,em,text){
  state.log.unshift({id:'l'+Date.now()+Math.floor(Math.random()*999),who:who,em:em,text:text,ts:Date.now()});
  if(state.log.length>40)state.log.length=40;
}
function dealDamage(who,amt){
  var r=state.raid;
  if(r.defeated&&amt>0)return;
  r.bossDealt=Math.max(0,Math.min(r.bossMax,r.bossDealt+amt));
  if(amt>0){ r.contrib[who]=(r.contrib[who]||0)+amt; }
  else if(amt<0 && r.contrib[who]>0){ r.contrib[who]+=amt; }
}
function checkRaidDefeat(){
  var r=state.raid;
  if(!r.defeated && r.bossDealt>=r.bossMax){
    r.defeated=true;
    addLog('daddy','🎉','THE CLAN DEFEATED THE BOSS! '+r.name+' is unlocked! 🍕🎉');
    setTimeout(function(){
      modal({
        title:'🎉 RAID COMPLETE!',
        custom:function(body){
          body.appendChild(E('div',{class:'bigcelebrate'},[E('span',{class:'em',text:'🍕'})]));
          body.appendChild(E('h2',{style:'text-align:center',text:r.name+' Unlocked!'}));
          body.appendChild(E('p',{style:'text-align:center;font-weight:700;color:var(--ink-soft)',
            text:'The M Clan defeated the boss together. Time to celebrate — '+r.name+' is ON! 🎉'}));
        },
        okLabel:'🎉 Celebrate!',okClass:'teal',onOk:function(){
          for(var i=0;i<3;i++)setTimeout(function(){burst(Math.random()*innerWidth,innerHeight*0.4);},i*250);
        }
      });
      burst(innerWidth/2,innerHeight/2);
    },400);
  }
}

/* ============================================================
   MODAL
   ============================================================ */
function modal(cfg){
  var wrap=$('#modalwrap'),m=$('#modal');clear(m);
  m.appendChild(E('div',{class:'grab'}));
  if(cfg.title)m.appendChild(E('h2',{text:cfg.title}));
  if(cfg.lead)m.appendChild(E('p',{class:'lead',text:cfg.lead}));
  var inputs={};
  if(cfg.fields){
    cfg.fields.forEach(function(f){
      var inp=E('input',{type:f.type||'text',value:f.value!=null?f.value:''});
      if(f.placeholder)inp.placeholder=f.placeholder;
      if(f.min!=null)inp.min=f.min;if(f.max!=null)inp.max=f.max;if(f.step!=null)inp.step=f.step;
      inputs[f.name]=inp;
      m.appendChild(E('div',{class:'field'},[E('label',{text:f.label}),inp]));
    });
  }
  if(cfg.custom){var b=E('div',{});cfg.custom(b);m.appendChild(b);}
  var btnrow=E('div',{style:'display:flex;gap:10px;margin-top:18px'});
  btnrow.appendChild(E('button',{class:'btn ghost',style:'flex:1',on:{click:closeModal}},'Close'));
  if(cfg.onOk){
    btnrow.appendChild(E('button',{class:'btn '+(cfg.okClass||'orange'),style:'flex:1.4',on:{click:function(){
      var vals={};for(var k in inputs)vals[k]=inputs[k].value;closeModal();cfg.onOk(vals);
    }}},cfg.okLabel||'OK'));
  }
  m.appendChild(btnrow);
  wrap.classList.add('show');
  wrap.onclick=function(e){if(e.target===wrap)closeModal();};
}
function closeModal(){$('#modalwrap').classList.remove('show');}

function emptyState(em,title,msg){
  return E('div',{class:'empty'},[E('span',{class:'em',text:em}),E('h3',{text:title}),E('p',{text:msg})]);
}

/* ============================================================
   BOOT
   ============================================================ */
function boot(){
  load();
  $('#splashCrest').innerHTML=crestSVG();
  $('#profileChip').addEventListener('click',openProfilePicker);
  render();
  // hide splash
  setTimeout(function(){$('#splash').classList.add('gone');},1600);
  document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});
}
boot();
</script>
