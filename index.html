<!DOCTYPE html>
<html lang="en" data-mode="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#4F7CFF">
<title>Chore Wars™ — Wheel of Fortune · The M Clan</title>
<!-- CSP: single-file app · Google Fonts + data/blob images (photo proof) · no remote script/eval -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; base-uri 'none'">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --primary:#4F7CFF; --primary-deep:#3A63E0; --primary-soft:#E8EEFF;
    --accent:#FF6B35; --accent-deep:#E8551F;
    --gold:#F59E0B; --gold-deep:#D97706;
    --green:#16A34A; --green-deep:#0E7A34;
    --purple:#A855F7;
    --ink:#1E2533; --ink-soft:#586173; --ink-faint:#8A94A6;
    --bg:#F4F6FB; --card:#FFFFFF; --line:#E7ECF3; --sunken:#EEF1F6;
    --shadow:0 6px 18px rgba(40,60,100,.10);
    --shadow-lg:0 18px 44px rgba(20,30,70,.22);
    --radius:22px; --radius-sm:14px; --radius-pill:999px;
    --safe-b:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:var(--bg);
    overscroll-behavior-y:none;-webkit-text-size-adjust:100%}
  h1,h2,h3,.dis{font-family:'Baloo 2',system-ui,sans-serif}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  :focus-visible{outline:3px solid var(--primary);outline-offset:2px;border-radius:10px}
  img{max-width:100%}
  .app{max-width:460px;margin:0 auto;min-height:100dvh;position:relative;background:var(--bg);
    box-shadow:0 0 60px rgba(20,30,70,.08)}
  .screen{display:none;flex-direction:column;min-height:100dvh}
  .screen.on{display:flex}

  /* ── WHO'S HERE ─────────────────────────────────────── */
  #who{background:#171b40 url('assets/arena-bg.png') center/cover no-repeat;color:#fff;
    align-items:center;justify-content:center;padding:32px 24px;gap:6px}
  #who .crest{width:78px;height:78px;border-radius:20px;object-fit:cover;box-shadow:var(--shadow-lg);margin-bottom:6px}
  #who h1{font-size:2.1rem;text-shadow:0 3px 16px rgba(0,0,0,.4)}
  #who h1 b{color:#FFD16B}
  #who .sub{color:#d6dcff;font-weight:800;font-size:.82rem;letter-spacing:.14em;text-transform:uppercase;margin-bottom:26px}
  .pickrow{display:flex;gap:18px;flex-wrap:wrap;justify-content:center}
  .pick{display:flex;flex-direction:column;align-items:center;gap:10px;background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.16);border-radius:24px;padding:18px 14px 14px;width:118px;backdrop-filter:blur(6px);transition:transform .12s}
  .pick:active{transform:scale(.95)}
  .pick .ava{width:74px;height:74px;border-radius:50%;display:grid;place-items:center;font-family:'Baloo 2';font-size:2rem;color:#fff;box-shadow:0 6px 16px rgba(0,0,0,.3)}
  .pick .nm{font-family:'Baloo 2';font-size:1.15rem}
  .pick .rl{font-size:.7rem;font-weight:800;color:#cdd8ff;text-transform:uppercase;letter-spacing:.05em}
  .ava.j{background:linear-gradient(135deg,#4F7CFF,#6C97FF)}
  .ava.d{background:linear-gradient(135deg,#16A34A,#22C55E)}
  .ava.p{background:linear-gradient(135deg,#A855F7,#EC4899)}

  /* ── HEADER ─────────────────────────────────────────── */
  .head{display:flex;align-items:center;gap:10px;padding:14px 16px 10px;position:sticky;top:0;
    background:rgba(244,246,251,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);z-index:30}
  .head .crest{width:36px;height:36px;border-radius:11px;object-fit:cover;box-shadow:var(--shadow)}
  .head .tt b{font-family:'Baloo 2';font-size:1.04rem;display:block;line-height:1}
  .head .tt span{font-size:.62rem;font-weight:800;color:var(--ink-soft);letter-spacing:.04em}
  .who-chip{margin-left:auto;display:flex;align-items:center;gap:7px;background:var(--card);
    border:2px solid var(--line);border-radius:var(--radius-pill);padding:3px 11px 3px 3px;font-weight:800;font-size:.84rem;box-shadow:var(--shadow)}
  .who-chip .ava{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;color:#fff;font-family:'Baloo 2';font-size:.82rem}
  .body{flex:1;overflow-y:auto;padding:14px 16px calc(28px + var(--safe-b))}

  /* ── STATS ──────────────────────────────────────────── */
  .stats{display:flex;gap:9px;margin-bottom:14px}
  .stat{flex:1;background:var(--card);border:1px solid var(--line);border-radius:var(--radius-sm);padding:10px 8px;text-align:center;box-shadow:var(--shadow)}
  .stat .n{font-family:'Baloo 2';font-size:1.15rem;line-height:1.05;display:flex;align-items:center;justify-content:center;gap:3px}
  .stat .k{font-size:.6rem;font-weight:800;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
  .stat.star .n{color:var(--primary-deep)} .stat.spin .n{color:var(--accent-deep)} .stat.streak .n{color:var(--gold-deep)}

  /* ── WHEEL ──────────────────────────────────────────── */
  .wheelcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);
    padding:14px 14px 18px;margin-bottom:14px;display:flex;flex-direction:column;align-items:center}
  .wheelstage{position:relative;width:300px;max-width:84vw;aspect-ratio:1;margin:4px auto 0}
  .pointer{position:absolute;top:-4px;left:50%;transform:translateX(-50%);z-index:6;width:0;height:0;
    border-left:16px solid transparent;border-right:16px solid transparent;border-top:28px solid var(--accent);filter:drop-shadow(0 3px 4px rgba(0,0,0,.28))}
  .pointer::after{content:"";position:absolute;top:-28px;left:-7px;width:13px;height:13px;background:var(--accent);border-radius:50%;border:3px solid #fff}
  svg.wheel{display:block;width:100%;height:100%;filter:drop-shadow(0 10px 24px rgba(20,30,70,.30))}
  .seg-emoji{font-size:20px} .seg-label{font-family:'Baloo 2';font-weight:800;fill:#fff;font-size:12px}
  .hub{position:absolute;top:50%;left:50%;width:66px;height:66px;transform:translate(-50%,-50%);border-radius:50%;
    background:#fff;box-shadow:0 4px 14px rgba(20,30,70,.3),inset 0 0 0 4px var(--gold);display:grid;place-items:center;z-index:5;overflow:hidden}
  .hub img{width:100%;height:100%;object-fit:cover}
  .spinbtn{margin-top:18px;width:100%;max-width:320px;background:linear-gradient(120deg,var(--accent),var(--accent-deep));color:#fff;
    font-family:'Baloo 2';font-size:1.15rem;padding:15px;border-radius:var(--radius-pill);box-shadow:0 10px 22px rgba(232,85,31,.42);
    display:flex;align-items:center;justify-content:center;gap:9px;transition:transform .12s,opacity .2s}
  .spinbtn:active{transform:scale(.97)}
  .spinbtn:disabled{background:var(--sunken);color:var(--ink-faint);box-shadow:none}
  .spinsub{font-size:.76rem;font-weight:800;color:var(--ink-soft);margin-top:9px;text-align:center}

  /* ── JACKPOT ────────────────────────────────────────── */
  .jackpot{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:13px 15px;box-shadow:var(--shadow);margin-bottom:14px}
  .jackpot .row{display:flex;align-items:center;gap:8px;font-family:'Baloo 2';font-size:.94rem}
  .jackpot .pct{margin-left:auto;color:var(--gold-deep);font-size:.84rem}
  .bar{height:13px;border-radius:99px;background:var(--primary-soft);margin-top:9px;overflow:hidden}
  .bar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--gold),var(--accent));transition:width .6s cubic-bezier(.2,.8,.2,1)}
  .jackpot small{display:block;margin-top:7px;font-weight:700;color:var(--ink-soft);font-size:.74rem}
  .modepill{margin-left:6px;font-size:.62rem;font-weight:800;background:var(--primary-soft);color:var(--primary-deep);padding:2px 8px;border-radius:99px;text-transform:uppercase;letter-spacing:.04em}

  /* ── SECTIONS / CHORES ──────────────────────────────── */
  .sec-t{font-family:'Baloo 2';font-size:.78rem;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-faint);margin:6px 2px 9px;display:flex;align-items:center;gap:7px}
  .sec-t .c{margin-left:auto;background:var(--card);border:1.5px solid var(--line);padding:2px 9px;border-radius:99px;font-size:.72rem;color:var(--ink-soft)}
  .qcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius-sm);padding:12px;margin-bottom:9px;box-shadow:var(--shadow);display:flex;align-items:center;gap:12px}
  .qicon{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-size:1.25rem;flex:0 0 auto;background:var(--primary-soft)}
  .qcard .qt{font-family:'Baloo 2';font-size:1rem;line-height:1.15}
  .qcard .qm{font-size:.74rem;font-weight:800;color:var(--ink-soft);margin-top:2px}
  .doneBtn{margin-left:auto;flex:0 0 auto;font-family:'Baloo 2';font-size:.82rem;padding:9px 14px;border-radius:99px;background:var(--green);color:#fff;display:flex;align-items:center;gap:6px;transition:transform .12s}
  .doneBtn:active{transform:scale(.95)}
  .qcard.done{opacity:.62} .qcard.done .qicon{background:#DCFCE7}
  .doneTag{margin-left:auto;font-family:'Baloo 2';font-size:.8rem;color:var(--green-deep);background:#DCFCE7;padding:7px 12px;border-radius:99px}

  /* ── PARENT ─────────────────────────────────────────── */
  .ptab{display:flex;gap:6px;margin-bottom:14px}
  .ptab .t{flex:1;text-align:center;font-family:'Baloo 2';font-size:.84rem;padding:9px;border-radius:12px;color:var(--ink-soft);background:var(--card);border:1px solid var(--line)}
  .ptab .t.on{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:var(--shadow)}
  .ptab-body{display:none} .ptab-body.on{display:block}
  .fair{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:12px;box-shadow:var(--shadow)}
  .fair .ft{font-family:'Baloo 2';display:flex;align-items:center;gap:7px;font-size:.96rem}
  .fair .ok{margin-left:auto;font-size:.7rem;background:#DCFCE7;color:var(--green-deep);padding:3px 10px;border-radius:99px;font-weight:800}
  .frow{display:flex;align-items:center;gap:10px;margin-top:11px}
  .frow .nm{width:52px;font-weight:800;font-size:.82rem}
  .frow .fb{flex:1;height:11px;border-radius:99px;background:var(--primary-soft);overflow:hidden}
  .frow .fb i{display:block;height:100%;border-radius:99px;transition:width .5s}
  .frow .v{width:34px;text-align:right;font-family:'Baloo 2';font-size:.82rem;color:var(--ink-soft)}
  .slice-row{display:flex;align-items:center;gap:11px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius-sm);padding:10px 13px;margin-bottom:8px;box-shadow:var(--shadow)}
  .swatch{width:15px;height:15px;border-radius:5px;flex:0 0 auto}
  .slice-row .st{font-family:'Baloo 2';font-size:.94rem}
  .slice-row .odds{margin-left:auto;font-weight:800;font-size:.78rem;color:var(--ink-soft);background:var(--bg);border:1px solid var(--line);padding:3px 10px;border-radius:99px}
  .kidcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:15px;margin-bottom:12px;box-shadow:var(--shadow)}
  .kidcard .kh{display:flex;align-items:center;gap:10px;font-family:'Baloo 2';font-size:1.05rem}
  .kidcard .kh .ava{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;color:#fff;font-family:'Baloo 2'}
  .kidcard .pr{margin-top:11px;font-weight:800;font-size:.88rem;color:var(--ink-soft)}
  .seg{display:inline-flex;background:var(--sunken);border-radius:99px;padding:3px;margin-top:9px}
  .seg button{font-family:'Baloo 2';font-size:.78rem;padding:6px 13px;border-radius:99px;color:var(--ink-soft)}
  .seg button.on{background:var(--card);color:var(--primary-deep);box-shadow:var(--shadow)}
  .redeem{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius-sm);padding:11px 13px;margin-bottom:9px;box-shadow:var(--shadow)}
  .redeem .re{width:40px;height:40px;border-radius:11px;background:var(--accent);color:#fff;display:grid;place-items:center;font-size:1.2rem;flex:0 0 auto}
  .redeem .rt{font-family:'Baloo 2';font-size:.96rem} .redeem .rm{font-size:.74rem;font-weight:800;color:var(--ink-soft)}
  .payBtn{margin-left:auto;font-family:'Baloo 2';font-size:.8rem;padding:8px 13px;border-radius:99px;background:var(--primary);color:#fff}
  .empty{text-align:center;color:var(--ink-faint);font-weight:800;font-size:.9rem;padding:26px 10px}

  .switchBtn{width:100%;margin-top:6px;font-family:'Baloo 2';font-size:.92rem;padding:13px;border-radius:var(--radius-pill);background:var(--card);border:2px solid var(--line);color:var(--ink-soft);box-shadow:var(--shadow)}

  /* ── WIN MODAL ──────────────────────────────────────── */
  .scrim{position:fixed;inset:0;background:rgba(13,18,50,.62);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:80;padding:24px}
  .scrim.on{display:flex}
  .winbox{background:linear-gradient(165deg,#243089,#3A63E0 60%,#4F7CFF);border-radius:28px;padding:22px;max-width:360px;width:100%;text-align:center;position:relative;overflow:hidden;box-shadow:var(--shadow-lg);animation:pop .35s cubic-bezier(.2,1.3,.4,1)}
  @keyframes pop{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
  .winbox::before{content:"";position:absolute;inset:-40% -10% auto;height:120%;background:radial-gradient(circle at 50% 28%,rgba(255,209,107,.45),transparent 60%)}
  .winbox .burst{width:190px;position:relative;z-index:2;filter:drop-shadow(0 12px 26px rgba(0,0,0,.4))}
  .winbox h2{color:#fff;font-size:1rem;letter-spacing:.16em;text-transform:uppercase;position:relative;z-index:2;opacity:.92;margin-top:-6px}
  .prize{position:relative;z-index:2;background:#fff;border-radius:var(--radius);padding:16px 22px;margin-top:12px;box-shadow:var(--shadow-lg)}
  .prize .pe{font-size:2.5rem} .prize .pt{font-family:'Baloo 2';font-size:1.5rem;color:var(--ink);margin-top:2px}
  .prize .pm{font-weight:800;color:var(--ink-soft);font-size:.82rem;margin-top:3px}
  .winbox .cta{position:relative;z-index:2;margin-top:20px}
  .winbox .keep{background:#fff;color:var(--primary-deep);font-family:'Baloo 2';font-size:1.05rem;padding:13px 30px;border-radius:99px;box-shadow:var(--shadow)}
  .winbox .toks{position:relative;z-index:2;color:#cdd8ff;font-weight:800;font-size:.8rem;margin-top:14px}

  /* ── FOOTER (Shomer standard — least focus) ─────────── */
  .studio-credit{display:flex;align-items:center;justify-content:center;gap:9px;padding:18px 16px calc(14px + var(--safe-b));direction:ltr;flex-wrap:wrap}
  .studio-credit .sc-badge{display:inline-flex;align-items:center;background:var(--sunken);border:1px solid var(--line);border-radius:7px;padding:4px 8px}
  .studio-credit .sc-badge img{height:15px;width:auto;display:block;opacity:.92}
  .studio-credit .cr{font-size:10.5px;color:var(--ink-faint);letter-spacing:.3px;line-height:1.4}
  .studio-credit .cr b{color:var(--ink-soft);font-weight:700}

  .toast{position:fixed;left:50%;bottom:calc(26px + var(--safe-b));transform:translateX(-50%) translateY(12px);background:#1E2533;color:#fff;
    font-weight:800;font-size:.86rem;padding:11px 18px;border-radius:99px;box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:.25s;z-index:90;max-width:90%}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  @media (prefers-reduced-motion:reduce){svg.wheel{transition:none !important}.winbox{animation:none}}
</style>
</head>
<body>
<div class="app">

  <!-- WHO'S HERE -->
  <section class="screen on" id="who">
    <img class="crest" src="assets/crest.jpg" alt="Chore Wars crest">
    <h1>Chore <b>Wars</b></h1>
    <div class="sub">⚔️ The M Clan · Who's here?</div>
    <div class="pickrow" id="pickrow"></div>
  </section>

  <!-- KID -->
  <section class="screen" id="kid">
    <div class="head">
      <img class="crest" src="assets/crest.jpg" alt="crest">
      <div class="tt"><b>My Wheel</b><span id="kidSpinsLbl">0 spins ready</span></div>
      <button class="who-chip" id="kidChip" onclick="goWho()"></button>
    </div>
    <div class="body">
      <div class="stats" id="kidStats"></div>
      <div class="wheelcard">
        <div class="wheelstage">
          <div class="pointer"></div>
          <svg class="wheel" id="wheel" viewBox="0 0 300 300" aria-label="Reward wheel"></svg>
          <div class="hub"><img src="assets/crest.jpg" alt=""></div>
        </div>
        <button class="spinbtn" id="spinBtn">SPIN THE WHEEL · 🎟️ <span id="spinCount">0</span></button>
        <div class="spinsub">Finish a chore to earn a spin 🎟️</div>
      </div>
      <div class="jackpot" id="jackpotBox"></div>
      <div class="sec-t">Today's chores <span class="c" id="choreCount">0</span></div>
      <div id="choreList"></div>
    </div>
  </section>

  <!-- PARENT -->
  <section class="screen" id="parent">
    <div class="head">
      <img class="crest" src="assets/crest.jpg" alt="crest">
      <div class="tt"><b>Manage</b><span>Daddy</span></div>
      <button class="who-chip" id="parentChip" onclick="goWho()"></button>
    </div>
    <div class="body">
      <div class="ptab">
        <button class="t on" data-tab="redeem">Redeem</button>
        <button class="t" data-tab="wheel">The Wheel</button>
        <button class="t" data-tab="kids">Kids</button>
      </div>
      <div class="ptab-body on" id="tab-redeem"></div>
      <div class="ptab-body" id="tab-wheel"></div>
      <div class="ptab-body" id="tab-kids"></div>
    </div>
  </section>

  <!-- WIN MODAL -->
  <div class="scrim" id="winScrim">
    <div class="winbox">
      <img class="burst" src="assets/loot-burst.png" alt="treasure burst">
      <h2 id="winTitle">Winner!</h2>
      <div class="prize">
        <div class="pe" id="winEmoji">🎉</div>
        <div class="pt" id="winPrize">Reward</div>
        <div class="pm" id="winMsg"></div>
      </div>
      <div class="cta"><button class="keep" id="winKeep">Keep it 🎉</button></div>
      <div class="toks">No blanks, ever — every spin pays out something real</div>
    </div>
  </div>

  <footer class="studio-credit">
    <span class="sc-badge"><img src="assets/3shamrocks_black.png" alt="3Shamrocks Studio" width="100" height="15"></span>
    <span class="cr">© 2026 <b>3Shamrocks Studio</b> · All rights reserved.</span>
  </footer>

  <div class="toast" id="toast"></div>
</div>

<script>
"use strict";
const KEY='chorewars_wheel_v1';

// Reward wheel — identical odds for every kid (fairness). No blanks.
const SLICES=[
  {id:'screen', e:'🕹️', t:'30 min',   c:'#4F7CFF', w:3, kind:'reward', label:'30 min screen time'},
  {id:'treat',  e:'🍪', t:'Treat',    c:'#16A34A', w:3, kind:'reward', label:'A treat'},
  {id:'dinner', e:'🍽️', t:'Dinner',   c:'#FF6B35', w:2, kind:'reward', label:'Pick tonight’s dinner'},
  {id:'coins',  e:'🪙', t:'+5 stars', c:'#3A63E0', w:3, kind:'stars',  amount:5, label:'+5 bonus stars'},
  {id:'stayup', e:'🌙', t:'Stay up',  c:'#22C55E', w:2, kind:'reward', label:'Stay up 15 min'},
  {id:'skip',   e:'⏭️', t:'Skip job', c:'#A855F7', w:1, kind:'reward', label:'Skip-a-chore token'},
  {id:'respin', e:'🎟️', t:'Spin x2',  c:'#E8551F', w:2, kind:'respin', label:'Spin again!'},
  {id:'jackpot',e:'💎', t:'JACKPOT',  c:'#F59E0B', w:1, kind:'jackpot', amount:25, label:'JACKPOT!'},
];
const N=SLICES.length, STEP=360/N;
const JACKPOT_TARGET=100;

function seed(){
  return {
    view:'who', current:null, familyJackpot:0,
    members:{
      jakob:{name:'Jakob', role:'kid', av:'j', stars:240, spins:2, streak:5,
        jackpot:55, mode:'kid', prize:'the LEGO set', won:[], weekStars:12},
      dean:{name:'Dean', role:'kid', av:'d', stars:175, spins:1, streak:3,
        jackpot:30, mode:'kid', prize:'a new scooter', won:[], weekStars:10},
      daddy:{name:'Dad', role:'parent', av:'p'}
    },
    chores:[
      {id:'c1', who:'jakob', icon:'🛏️', name:'Make your bed', meta:'Daily', done:true},
      {id:'c2', who:'jakob', icon:'🗑️', name:'Take out trash', meta:'Daily', done:false},
      {id:'c3', who:'jakob', icon:'🍽️', name:'Clear the table', meta:'One-off', done:false},
      {id:'c4', who:'dean',  icon:'🧦', name:'Sort the laundry', meta:'Daily', done:false},
      {id:'c5', who:'dean',  icon:'🪥', name:'Brush teeth', meta:'Daily', done:true},
      {id:'c6', who:'dean',  icon:'📚', name:'Tidy your books', meta:'One-off', done:false},
    ]
  };
}
let S=load();
function load(){ try{const j=JSON.parse(localStorage.getItem(KEY));return j&&j.members?j:seed();}catch(e){return seed();} }
function save(){ try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){} }

// ── helpers ──
const $=id=>document.getElementById(id);
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2300);}
function avHtml(av){return `<span class="ava ${av}">${av==='j'?'J':'D'}</span>`;}
function show(v){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));$(v).classList.add('on');S.view=v;window.scrollTo(0,0);}
function goWho(){S.current=null;save();show('who');renderWho();}

// ── WHEEL SVG ──
function buildWheel(){
  const cx=150,cy=150,r=143;
  let h=`<circle cx="${cx}" cy="${cy}" r="${r+4}" fill="#fff"/>`;
  SLICES.forEach((s,i)=>{
    const a0=(i*STEP-90-STEP/2)*Math.PI/180, a1=a0+STEP*Math.PI/180;
    const x0=cx+r*Math.cos(a0),y0=cy+r*Math.sin(a0),x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1);
    h+=`<path d="M${cx},${cy} L${x0.toFixed(1)},${y0.toFixed(1)} A${r},${r} 0 0 1 ${x1.toFixed(1)},${y1.toFixed(1)} Z" fill="${s.c}" stroke="#fff" stroke-width="2.5"/>`;
    const am=(i*STEP-90)*Math.PI/180, lr=r*0.64, lx=cx+lr*Math.cos(am), ly=cy+lr*Math.sin(am), deg=(i*STEP);
    h+=`<g transform="translate(${lx.toFixed(1)},${ly.toFixed(1)}) rotate(${deg})"><text class="seg-emoji" text-anchor="middle" y="-5">${s.e}</text><text class="seg-label" text-anchor="middle" y="13">${s.t}</text></g>`;
  });
  h+=`<circle cx="${cx}" cy="${cy}" r="${r+4}" fill="none" stroke="#F59E0B" stroke-width="6"/>`;
  for(let i=0;i<N*2;i++){const a=(i*180/N-90)*Math.PI/180,sx=cx+(r+4)*Math.cos(a),sy=cy+(r+4)*Math.sin(a);h+=`<circle cx="${sx.toFixed(1)}" cy="${sy.toFixed(1)}" r="3.2" fill="#FFE7A8" stroke="#D97706" stroke-width="1"/>`;}
  $('wheel').innerHTML=h;
}
let curRot=0, spinning=false;
function weightedPick(){const tot=SLICES.reduce((a,s)=>a+s.w,0);let r=Math.random()*tot;for(let i=0;i<N;i++){r-=SLICES[i].w;if(r<=0)return i;}return N-1;}

function doSpin(){
  const k=S.members[S.current]; if(spinning||!k||k.spins<1)return;
  spinning=true; k.spins--; save(); renderKid();
  const idx=weightedPick(), seg=SLICES[idx];
  const jitter=Math.random()*30-15;
  const base=((curRot % 360)+360)%360;
  const target=curRot - base + 360*5 - idx*STEP + jitter;
  curRot=target;
  const wheel=$('wheel');
  const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  wheel.style.transition=reduce?'none':'transform 4.6s cubic-bezier(.15,.85,.18,1)';
  requestAnimationFrame(()=>{wheel.style.transform=`rotate(${target}deg)`;});
  let done=false;
  const finish=()=>{ if(done)return; done=true; wheel.removeEventListener('transitionend',finish); award(seg); spinning=false; };
  if(reduce){award(seg);spinning=false;} else {wheel.addEventListener('transitionend',finish);setTimeout(finish,5200);}
}

function award(seg){
  const k=S.members[S.current];
  let emoji=seg.e, prize=seg.label, msg='Added to your rewards · tell Dad to redeem', title='Winner!';
  if(seg.kind==='stars'){ k.stars+=seg.amount; k.weekStars+=seg.amount; msg='Bonus stars added to your total ⭐'; }
  else if(seg.kind==='respin'){ k.spins++; msg='You earned your spin back — go again! 🎟️'; title='Lucky!'; }
  else if(seg.kind==='jackpot'){
    title='JACKPOT! 💎';
    if(k.mode==='family'){ S.familyJackpot=Math.min(JACKPOT_TARGET,S.familyJackpot+seg.amount); msg='Added to the FAMILY jackpot 💎'; }
    else { k.jackpot=Math.min(JACKPOT_TARGET,k.jackpot+seg.amount); msg='Your big-prize meter jumped! 💎'; }
  }
  else { k.won.push({label:seg.label, e:seg.e, t:Date.now()}); }
  save();
  $('winTitle').textContent=title; $('winEmoji').textContent=emoji; $('winPrize').textContent=prize; $('winMsg').textContent=msg;
  $('winScrim').classList.add('on');
  renderKid();
}

// ── RENDER: WHO ──
function renderWho(){
  $('pickrow').innerHTML=Object.entries(S.members).map(([id,m])=>
    `<button class="pick" onclick="enter('${id}')"><span class="ava ${m.av}">${m.name[0]}</span><span class="nm">${m.name}</span><span class="rl">${m.role==='parent'?'Parent':'Hunter'}</span></button>`
  ).join('');
}
function enter(id){ S.current=id; save(); const m=S.members[id]; if(m.role==='parent'){show('parent');renderParent();} else {show('kid');renderKid();} }

// ── RENDER: KID ──
function renderKid(){
  const k=S.members[S.current]; if(!k)return;
  $('kidChip').innerHTML=`${avHtml(k.av)} ${k.name}`;
  $('kidSpinsLbl').textContent=`${k.spins} spin${k.spins===1?'':'s'} ready`;
  $('kidStats').innerHTML=
    `<div class="stat star"><div class="n">⭐ ${k.stars}</div><div class="k">Stars</div></div>`+
    `<div class="stat spin"><div class="n">🎟️ ${k.spins}</div><div class="k">Spins</div></div>`+
    `<div class="stat streak"><div class="n">🔥 ${k.streak}</div><div class="k">Day streak</div></div>`;
  $('spinCount').textContent=k.spins;
  $('spinBtn').disabled=k.spins<1||spinning;
  const fam=k.mode==='family';
  const val=fam?S.familyJackpot:k.jackpot, pct=Math.round(val/JACKPOT_TARGET*100);
  $('jackpotBox').innerHTML=
    `<div class="row">💎 ${fam?'Family Jackpot':'Jackpot'} — ${fam?'one big clan reward':'saving for '+k.prize}<span class="modepill">${fam?'Family':'Per-kid'}</span><span class="pct">${pct}%</span></div>`+
    `<div class="bar"><i style="width:${pct}%"></i></div>`+
    `<small>Land the 💎 slice to fill faster · ${val} / ${JACKPOT_TARGET} 💎${pct>=100?' — PRIZE UNLOCKED! 🎉 tell Dad':''}</small>`;
  const mine=S.chores.filter(c=>c.who===S.current);
  const left=mine.filter(c=>!c.done).length;
  $('choreCount').textContent=`${left} left`;
  $('choreList').innerHTML=mine.map(c=>
    `<div class="qcard ${c.done?'done':''}"><div class="qicon">${c.icon}</div>`+
    `<div><div class="qt">${c.name}</div><div class="qm">${c.meta} · earns 🎟️ +⭐</div></div>`+
    (c.done?`<span class="doneTag">Done ✓</span>`:`<button class="doneBtn" onclick="finishChore('${c.id}')">Finish ✓</button>`)+
    `</div>`).join('');
}
function finishChore(id){
  const c=S.chores.find(x=>x.id===id); if(!c||c.done)return;
  c.done=true; const k=S.members[S.current]; k.spins++; k.stars+=10; k.weekStars+=10; save();
  toast('Chore done! +🎟️ spin · +10 ⭐'); renderKid();
}

// ── RENDER: PARENT ──
let pTab='redeem';
function renderParent(){
  $('parentChip').innerHTML=`${avHtml('p')} Dad`;
  document.querySelectorAll('.ptab .t').forEach(b=>b.classList.toggle('on',b.dataset.tab===pTab));
  document.querySelectorAll('.ptab-body').forEach(b=>b.classList.remove('on'));
  $('tab-'+pTab).classList.add('on');
  if(pTab==='redeem')renderRedeem(); else if(pTab==='wheel')renderWheelTab(); else renderKidsTab();
}
function renderRedeem(){
  const kids=['jakob','dean']; let html='';
  kids.forEach(id=>{const k=S.members[id];
    if(k.won.length){ html+=`<div class="sec-t">${k.name}'s rewards to give <span class="c">${k.won.length}</span></div>`;
      k.won.forEach((w,i)=>{html+=`<div class="redeem"><div class="re">${w.e}</div><div><div class="rt">${w.label}</div><div class="rm">${k.name} won this</div></div><button class="payBtn" onclick="payOut('${id}',${i})">Mark given</button></div>`;});
    }
  });
  if(!html)html='<div class="empty">No rewards waiting. When the kids spin and win, they show up here to pay out. 🎁</div>';
  $('tab-redeem').innerHTML=html;
}
function payOut(id,i){ S.members[id].won.splice(i,1); save(); toast('Reward marked as given ✓'); renderRedeem(); }
function renderWheelTab(){
  let html=`<div class="fair"><div class="ft">🎯 Same wheel, same odds for both kids</div><small style="display:block;margin-top:8px;font-weight:700;color:var(--ink-soft);font-size:.78rem">No blanks. Differences in winnings come only from how many chores each kid finishes — never luck stacked against a sibling.</small></div>`;
  html+=`<div class="sec-t">Reward slices <span class="c">${N}</span></div>`;
  SLICES.forEach(s=>{html+=`<div class="slice-row"><span class="swatch" style="background:${s.c}"></span><span class="st">${s.e} ${s.label}</span><span class="odds">${s.w}×</span></div>`;});
  $('tab-wheel').innerHTML=html;
}
function renderKidsTab(){
  const j=S.members.jakob.weekStars, d=S.members.dean.weekStars, mx=Math.max(j,d,1);
  const bal=Math.abs(j-d)<=Math.max(6,mx*0.35);
  let html=`<div class="fair"><div class="ft">⚖️ Fairness this week <span class="ok">${bal?'✓ Balanced':'Catching up'}</span></div>`+
    `<div class="frow"><span class="nm">Jakob</span><span class="fb"><i style="width:${Math.round(j/mx*100)}%;background:linear-gradient(90deg,#4F7CFF,#6C97FF)"></i></span><span class="v">${j}</span></div>`+
    `<div class="frow"><span class="nm">Dean</span><span class="fb"><i style="width:${Math.round(d/mx*100)}%;background:linear-gradient(90deg,#16A34A,#22C55E)"></i></span><span class="v">${d}</span></div>`+
    `<small style="display:block;margin-top:9px;font-weight:700;color:var(--ink-soft);font-size:.74rem">Weekly stars earned from finished chores. Spread chores evenly to keep both hunters climbing.</small></div>`;
  ['jakob','dean'].forEach(id=>{const k=S.members[id];const fam=k.mode==='family';const val=fam?S.familyJackpot:k.jackpot;
    html+=`<div class="kidcard"><div class="kh"><span class="ava ${k.av}">${k.name[0]}</span> ${k.name}</div>`+
      `<div class="pr">🎯 Big prize: <b>${k.prize}</b> · 💎 ${val}/${JACKPOT_TARGET}</div>`+
      `<div class="seg"><button class="${!fam?'on':''}" onclick="setMode('${id}','kid')">Per-kid jackpot</button><button class="${fam?'on':''}" onclick="setMode('${id}','family')">Family jackpot</button></div></div>`;});
  $('tab-kids').innerHTML=html;
}
function setMode(id,m){ S.members.jakob.mode=m; S.members.dean.mode=m; save(); toast(m==='family'?'Switched to one shared family jackpot 👨‍👦‍👦':'Each kid saves toward their own prize'); renderKidsTab(); }

// ── events ──
$('spinBtn').addEventListener('click',doSpin);
$('winKeep').addEventListener('click',()=>$('winScrim').classList.remove('on'));
$('winScrim').addEventListener('click',e=>{if(e.target===$('winScrim'))$('winScrim').classList.remove('on');});
document.querySelectorAll('.ptab .t').forEach(b=>b.addEventListener('click',()=>{pTab=b.dataset.tab;renderParent();}));

// ── boot ──
buildWheel();
if(S.current&&S.members[S.current]){ const m=S.members[S.current]; if(m.role==='parent'){show('parent');renderParent();}else{show('kid');renderKid();} }
else { show('who'); renderWho(); }
</script>
</body>
</html>
